<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" role="img" aria-labelledby="title desc">
  <title id="title">Home SOC Lab project image</title>
  <desc id="desc">A dark SOC lab dashboard with log streams, alerts, and connected hosts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0d1627"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#2196f3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="506" fill="url(#bg)"/>
  <g opacity="0.28" stroke="#1a2f52">
    <path d="M0 84H900M0 168H900M0 252H900M0 336H900M0 420H900"/>
    <path d="M100 0V506M200 0V506M300 0V506M400 0V506M500 0V506M600 0V506M700 0V506M800 0V506"/>
  </g>
  <rect x="54" y="52" width="792" height="402" rx="10" fill="#020509" stroke="#1a2f52" stroke-width="2"/>
  <rect x="54" y="52" width="792" height="54" rx="10" fill="#111e35"/>
  <circle cx="88" cy="79" r="7" fill="#ff5f57"/>
  <circle cx="113" cy="79" r="7" fill="#febc2e"/>
  <circle cx="138" cy="79" r="7" fill="#28c840"/>
  <text x="178" y="87" fill="#00e5ff" font-family="Consolas, monospace" font-size="20" letter-spacing="3">HOME SOC LAB</text>
  <g font-family="Consolas, monospace" font-size="15">
    <text x="86" y="156" fill="#4a6080">SOURCE</text>
    <text x="265" y="156" fill="#4a6080">LOG EVENT</text>
    <text x="640" y="156" fill="#4a6080">ACTION</text>
    <text x="86" y="205" fill="#c9d8f0">win-lab-01</text>
    <text x="265" y="205" fill="#c9d8f0">failed login detected</text>
    <text x="640" y="205" fill="#ffd740">TRIAGE</text>
    <text x="86" y="249" fill="#c9d8f0">ubuntu-srv</text>
    <text x="265" y="249" fill="#c9d8f0">ssh accepted</text>
    <text x="640" y="249" fill="#00e676">NORMAL</text>
    <text x="86" y="293" fill="#c9d8f0">splunk-free</text>
    <text x="265" y="293" fill="#c9d8f0">alert threshold matched</text>
    <text x="640" y="293" fill="#00e5ff">REVIEW</text>
  </g>
  <g transform="translate(92 346)">
    <rect width="314" height="64" rx="6" fill="#0d1627" stroke="#1a2f52"/>
    <text x="22" y="40" fill="#00e5ff" font-family="Consolas, monospace" font-size="16">index=lab failed login</text>
  </g>
  <g transform="translate(492 332)">
    <rect width="278" height="86" rx="6" fill="#0d1627" stroke="#1a2f52"/>
    <polyline points="24,58 70,48 112,55 158,28 205,40 250,22" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="158" cy="28" r="6" fill="#00e5ff"/>
    <circle cx="250" cy="22" r="6" fill="#00e5ff"/>
  </g>
</svg>
